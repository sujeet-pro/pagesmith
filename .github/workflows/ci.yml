name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt every job into the Node.js 24 runtime for JavaScript-based actions so
# any third-party action that has not yet shipped a Node 24 build still runs
# on Node 24 instead of the deprecated Node 20 runtime. All first-party
# `actions/*` used here are already pinned to Node-24-default majors.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ---------------------------------------------------------------------------
# Dependency graph (parallelism maximised, jobs run independently so a
# failure in one branch never cancels siblings — we want to surface every
# failure in a single run):
#
#   ┌──── validate-diagrams ──────────────────────────────────────────┐
#   │                                                                 │
#   ├──── build-library ──┬── lint ────────────────────────────────┐  │
#   │                     ├── unit ────────────────────────────────┤  │
#   │                     ├── build-docs ──┬── e2e ────────────────┤  ├── ci-success
#   │                     │                ├── e2e-a11y ───────────┤  │            │
#   │                     │                └── validate-a11y ──────┤  │            │
#   │                     └── build-examples [matrix x8, fail-fast: │  │            │ (only on main + push)
#   │                                          false, inline       │  │            │
#   │                                          validation] ────────┘  │            ├── assemble-pages ── deploy-pages
#   └─────────────────────────────────────────────────────────────────┘
#
# Notes:
#   - The legacy `install` job was dropped: each runner is fresh so it
#     could not share node_modules; `setup-node@v5` with `cache: npm`
#     warms the npm download cache for every downstream `npm ci` already.
#   - `lint` and `unit` reuse the `library-dist` artifact instead of each
#     re-running `npm run build:library` (~3 min saved per job).
#   - `validate-examples` was folded into the `build-examples` matrix —
#     the standalone job rebuilt every example a second time.
#   - `e2e` caches `~/.cache/ms-playwright` keyed on package-lock.json so
#     the chromium download (~150 MB) only happens when the lockfile
#     changes. `e2e-a11y` reuses the same cache.
#   - `validate-a11y` runs the static (jsdom + axe-core) scan over every
#     generated HTML page; `e2e-a11y` runs the runtime (Chromium + axe)
#     scan over a representative slice with computed-style/contrast
#     coverage. Together they enforce the WCAG 2.2 AA contract.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Tier 1 — independent jobs (run in parallel, only need the source tree).
  # -------------------------------------------------------------------------

  validate-diagrams:
    name: Validate diagrams
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run validate:diagrams

  build-library:
    name: Build library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run build:library
      - name: Upload library dist
        uses: actions/upload-artifact@v7
        with:
          name: library-dist
          path: packages/*/dist
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # Tier 2 — anything that needs the built library. Each job downloads the
  # `library-dist` artifact instead of rebuilding it.
  # -------------------------------------------------------------------------

  lint:
    name: Lint & typecheck
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: library-dist
          path: packages
      - run: npm run check

  unit:
    name: Unit & integration tests
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: library-dist
          path: packages
      - run: npm test

  build-docs:
    name: Build docs site
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: library-dist
          path: packages
      - run: npm run build:docs
      - name: Upload docs gh-pages output
        uses: actions/upload-artifact@v7
        with:
          name: gh-pages-docs
          path: gh-pages
          if-no-files-found: error
          retention-days: 1

  build-examples:
    name: Build & validate example (${{ matrix.example.name }})
    needs: build-library
    runs-on: ubuntu-latest
    strategy:
      # Always run every example so a single broken example does not hide
      # other failures in the same run.
      fail-fast: false
      matrix:
        example:
          - { name: blog-site, out: gh-pages/examples/blog-site }
          - { name: doc-site, out: gh-pages/examples/doc-site }
          - { name: with-nextjs, out: gh-pages/examples/nextjs }
          - { name: with-react, out: gh-pages/examples/react }
          - { name: with-solid, out: gh-pages/examples/solid }
          - { name: with-svelte, out: gh-pages/examples/svelte }
          - { name: with-vanilla-ejs, out: gh-pages/examples/vanilla-ejs }
          - { name: with-vanilla-hbs, out: gh-pages/examples/vanilla-hbs }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: library-dist
          path: packages
      - name: Build ${{ matrix.example.name }}
        run: npm run build:${{ matrix.example.name }}
      # Inline parity with `scripts/validate-examples.ts`. Doing it here
      # avoids a second job that rebuilt every example after the matrix.
      - name: Validate example output
        env:
          OUT: ${{ matrix.example.out }}
        run: |
          test -d "$OUT" || { echo "::error::output dir not found: $OUT"; exit 1; }
          missing=0
          for f in index.html llms.txt llms-full.txt; do
            if ! find "$OUT" -name "$f" -print -quit 2>/dev/null | grep -q .; then
              echo "::error::missing $f under $OUT"
              missing=1
            fi
          done
          exit $missing
      - name: Upload example gh-pages output
        uses: actions/upload-artifact@v7
        with:
          name: gh-pages-example-${{ matrix.example.name }}
          path: gh-pages
          if-no-files-found: ignore
          retention-days: 1

  # -------------------------------------------------------------------------
  # Tier 3 — needs the built docs site.
  # -------------------------------------------------------------------------

  e2e:
    name: Playwright e2e
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: gh-pages-docs
          path: gh-pages
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Skip the a11y suite here so this job stays focused on functional
      # e2e coverage. `e2e-a11y` runs it as a separate job with the same
      # artifact + browser cache.
      - run: npx playwright test --grep-invert "WCAG 2.2 AA"

  e2e-a11y:
    name: Accessibility (Playwright + axe-core)
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: gh-pages-docs
          path: gh-pages
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # Runtime axe-core scan — covers color-contrast, focus order, and
      # other layout/computed-style checks the static scan can't see.
      - run: npx playwright test --grep "WCAG 2.2 AA"

  validate-a11y:
    name: Static a11y scan (jsdom + axe-core)
    needs: [build-docs, build-examples]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v8
        with:
          name: gh-pages-docs
          path: gh-pages
      # Pull every example artifact so the static scan covers every page
      # the deploy job would publish, not just the docs site.
      - uses: actions/download-artifact@v8
        with:
          pattern: gh-pages-example-*
          merge-multiple: true
          path: gh-pages
      - run: npm run validate:a11y

  # -------------------------------------------------------------------------
  # Single aggregator gate. `if: always()` so it runs even when a sibling
  # failed; this lets every quality gate finish (instead of fail-fast)
  # while still surfacing a single required check on the PR.
  # -------------------------------------------------------------------------

  ci-success:
    name: CI success
    if: always()
    needs:
      - validate-diagrams
      - build-library
      - lint
      - unit
      - build-docs
      - build-examples
      - e2e
      - e2e-a11y
      - validate-a11y
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        env:
          RESULTS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "Aggregated needs results:"
          echo "$RESULTS_JSON"
          # `jq` is preinstalled on ubuntu-latest. We let every required job
          # finish (no fail-fast across jobs) and only fail the aggregator at
          # the end, so a single CI run surfaces every failure at once.
          mapfile -t failed < <(echo "$RESULTS_JSON" | jq -r 'to_entries | map(select(.value.result != "success")) | .[].key')
          if [ ${#failed[@]} -gt 0 ]; then
            for job in "${failed[@]}"; do
              echo "::error::$job did not succeed"
            done
            exit 1
          fi
          echo "All required jobs succeeded."

  # -------------------------------------------------------------------------
  # Final deploy — only for pushes to main after the aggregator gate passes.
  # -------------------------------------------------------------------------

  assemble-pages:
    name: Assemble gh-pages artifact
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ci-success
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: gh-pages-*
          merge-multiple: true
          path: gh-pages
      - uses: actions/upload-pages-artifact@v5
        with:
          path: gh-pages

  deploy-pages:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: assemble-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
