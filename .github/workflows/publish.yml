name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version to release (for example 0.8.0)
        required: false
        type: string
      packages:
        description: Packages to publish ("all" or a comma-separated subset like "site,docs")
        required: false
        type: string
        default: all
      bump:
        description: Version bump type when version is not set
        required: false
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Dependency graph (mirrors `ci.yml` so quality gates stay in lockstep with
# release validation, and runs them in parallel instead of as one giant
# sequential `npm run validate` step):
#
#   prepare ──┬── build-library ──┬── lint
#             │                   ├── unit
#             │                   ├── validate-examples
#             │                   ├── build-docs ── validate-pagesmith
#             │                   └── (feeds publish)
#             ├── validate-diagrams
#             │
#             └── (all gates pass) ─── publish ─── tag-and-commit
#
# `prepare` syncs the new release version into every package.json + the
# lockfile and uploads them as an artifact. Every downstream job restores
# that artifact before running `npm ci`, so they all build/test/publish
# against the exact release version.
# ---------------------------------------------------------------------------

jobs:
  prepare:
    name: Resolve & sync release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      exact_version_mode: ${{ steps.version.outputs.exact_version_mode }}
      selected_core: ${{ steps.selection.outputs.selected_core }}
      selected_site: ${{ steps.selection.outputs.selected_site }}
      selected_docs: ${{ steps.selection.outputs.selected_docs }}
      publish_core: ${{ steps.published.outputs.publish_core }}
      publish_site: ${{ steps.published.outputs.publish_site }}
      publish_docs: ${{ steps.published.outputs.publish_docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      # Resolve the release version from the current package line or an explicit override.
      - name: Resolve version
        id: version
        run: |
          OLD_VERSION=$(node -p "require('./packages/core/package.json').version")

          if [ -n "${{ inputs.version }}" ]; then
            NEW_VERSION=$(node --strip-types --no-warnings ./scripts/resolve-release-version.ts \
              --version "${{ inputs.version }}")
            echo "exact_version_mode=true" >> "$GITHUB_OUTPUT"
          else
            BUMP_TYPE="${{ inputs.bump }}"
            if [ -z "$BUMP_TYPE" ] || [ "$BUMP_TYPE" = "auto" ]; then
              echo "Pick patch/minor/major when version is not set." >&2
              exit 1
            fi

            NEW_VERSION=$(node --strip-types --no-warnings ./scripts/resolve-release-version.ts \
              --current "$OLD_VERSION" \
              --bump "$BUMP_TYPE")
            echo "exact_version_mode=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.version }}" ]; then
            echo "Releasing explicit version $NEW_VERSION (current line: $OLD_VERSION)"
          else
            echo "Bumping $OLD_VERSION → $NEW_VERSION (${{ inputs.bump }})"
          fi

      - name: Resolve package selection
        id: selection
        run: |
          REQUESTED="${{ inputs.packages }}"
          if [ -z "$REQUESTED" ]; then
            REQUESTED="all"
          fi

          SELECT_CORE=false
          SELECT_SITE=false
          SELECT_DOCS=false

          normalize_entry() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]' | xargs
          }

          if [ "$(normalize_entry "$REQUESTED")" = "all" ]; then
            SELECT_CORE=true
            SELECT_SITE=true
            SELECT_DOCS=true
            NORMALIZED="all"
          else
            IFS=',' read -r -a RAW_ENTRIES <<< "$REQUESTED"
            for raw_entry in "${RAW_ENTRIES[@]}"; do
              entry=$(normalize_entry "$raw_entry")
              case "$entry" in
                core) SELECT_CORE=true ;;
                site) SELECT_SITE=true ;;
                docs) SELECT_DOCS=true ;;
                '') ;;
                *)
                  echo "Invalid packages input: $REQUESTED" >&2
                  echo 'Use "all" or a comma-separated subset from core,site,docs.' >&2
                  exit 1
                  ;;
              esac
            done

            if [ "$SELECT_CORE" != "true" ] && [ "$SELECT_SITE" != "true" ] && [ "$SELECT_DOCS" != "true" ]; then
              echo "No packages selected." >&2
              exit 1
            fi

            NORMALIZED=""
            if [ "$SELECT_CORE" = "true" ]; then NORMALIZED="core"; fi
            if [ "$SELECT_SITE" = "true" ]; then NORMALIZED="${NORMALIZED:+$NORMALIZED,}site"; fi
            if [ "$SELECT_DOCS" = "true" ]; then NORMALIZED="${NORMALIZED:+$NORMALIZED,}docs"; fi
          fi

          if [ "${{ steps.version.outputs.exact_version_mode }}" != "true" ] && [ "$NORMALIZED" != "all" ]; then
            echo "Selective publish requires an explicit version so new release lines stay coordinated." >&2
            exit 1
          fi

          echo "selected_packages=$NORMALIZED" >> "$GITHUB_OUTPUT"
          echo "selected_core=$SELECT_CORE" >> "$GITHUB_OUTPUT"
          echo "selected_site=$SELECT_SITE" >> "$GITHUB_OUTPUT"
          echo "selected_docs=$SELECT_DOCS" >> "$GITHUB_OUTPUT"
          echo "Selected packages: $NORMALIZED"

      - name: Check published versions
        id: published
        run: |
          VERSION=${{ steps.version.outputs.version }}
          EXACT_VERSION_MODE="${{ steps.version.outputs.exact_version_mode }}"
          SELECT_CORE="${{ steps.selection.outputs.selected_core }}"
          SELECT_SITE="${{ steps.selection.outputs.selected_site }}"
          SELECT_DOCS="${{ steps.selection.outputs.selected_docs }}"
          PUBLISHED_COUNT=0

          package_exists() {
            local package_name=$1
            if npm view "${package_name}@${VERSION}" version >/dev/null 2>&1; then
              echo true
            else
              echo false
            fi
          }

          CORE_EXISTS=$(package_exists "@pagesmith/core")
          SITE_EXISTS=$(package_exists "@pagesmith/site")
          DOCS_EXISTS=$(package_exists "@pagesmith/docs")

          echo "core_exists=$CORE_EXISTS" >> "$GITHUB_OUTPUT"
          echo "site_exists=$SITE_EXISTS" >> "$GITHUB_OUTPUT"
          echo "docs_exists=$DOCS_EXISTS" >> "$GITHUB_OUTPUT"

          if [ "$CORE_EXISTS" = "true" ]; then PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1)); fi
          if [ "$SITE_EXISTS" = "true" ]; then PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1)); fi
          if [ "$DOCS_EXISTS" = "true" ]; then PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1)); fi

          PUBLISH_CORE=false
          PUBLISH_SITE=false
          PUBLISH_DOCS=false

          if [ "$EXACT_VERSION_MODE" != "true" ]; then
            if [ "$PUBLISHED_COUNT" -eq 3 ]; then
              echo "Version ${VERSION} is already fully published." >&2
              exit 1
            fi

            if [ "$PUBLISHED_COUNT" -ne 0 ]; then
              echo "Partial publish detected for ${VERSION}. Aborting to avoid a mixed-source release." >&2
              echo "Finish that version from the exact same source commit or release a newer version instead." >&2
              exit 1
            fi

            PUBLISH_CORE=$SELECT_CORE
            PUBLISH_SITE=$SELECT_SITE
            PUBLISH_DOCS=$SELECT_DOCS
          else
            WILL_HAVE_CORE=$CORE_EXISTS
            WILL_HAVE_SITE=$SITE_EXISTS

            if [ "$SELECT_CORE" = "true" ]; then
              WILL_HAVE_CORE=true
            fi
            if [ "$SELECT_SITE" = "true" ]; then
              WILL_HAVE_SITE=true
            fi

            if [ "$SELECT_SITE" = "true" ] && [ "$WILL_HAVE_CORE" != "true" ]; then
              echo "Cannot publish @pagesmith/site@${VERSION} unless @pagesmith/core@${VERSION} is already published or selected in this run." >&2
              exit 1
            fi

            if [ "$SELECT_DOCS" = "true" ] && { [ "$WILL_HAVE_CORE" != "true" ] || [ "$WILL_HAVE_SITE" != "true" ]; }; then
              echo "Cannot publish @pagesmith/docs@${VERSION} unless @pagesmith/core@${VERSION} and @pagesmith/site@${VERSION} are already published or selected in this run." >&2
              exit 1
            fi

            if [ "$SELECT_CORE" = "true" ]; then
              if [ "$CORE_EXISTS" = "true" ]; then
                echo "Skipping @pagesmith/core@${VERSION}; already published."
              else
                PUBLISH_CORE=true
              fi
            fi

            if [ "$SELECT_SITE" = "true" ]; then
              if [ "$SITE_EXISTS" = "true" ]; then
                echo "Skipping @pagesmith/site@${VERSION}; already published."
              else
                PUBLISH_SITE=true
              fi
            fi

            if [ "$SELECT_DOCS" = "true" ]; then
              if [ "$DOCS_EXISTS" = "true" ]; then
                echo "Skipping @pagesmith/docs@${VERSION}; already published."
              else
                PUBLISH_DOCS=true
              fi
            fi
          fi

          echo "publish_core=$PUBLISH_CORE" >> "$GITHUB_OUTPUT"
          echo "publish_site=$PUBLISH_SITE" >> "$GITHUB_OUTPUT"
          echo "publish_docs=$PUBLISH_DOCS" >> "$GITHUB_OUTPUT"

      # Keep public package versions and internal dependency ranges in lockstep
      - name: Sync package versions
        run: |
          VERSION=${{ steps.version.outputs.version }}
          npm run sync:versions -- "$VERSION"
          npm install --package-lock-only --ignore-scripts

      - name: Upload synced manifests
        uses: actions/upload-artifact@v4
        with:
          name: release-manifests
          path: |
            package.json
            package-lock.json
            packages/*/package.json
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # Tier 1 — independent jobs that need no library build.
  # -------------------------------------------------------------------------

  validate-diagrams:
    name: Validate diagrams
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - run: npm run validate:diagrams

  build-library:
    name: Build library
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - run: npm run build:library
      - name: Upload library dist
        uses: actions/upload-artifact@v4
        with:
          name: library-dist
          path: packages/*/dist
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # Tier 2 — needs the built library. Runs in parallel.
  # -------------------------------------------------------------------------

  lint:
    name: Lint & typecheck
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages
      - run: npm run check

  unit:
    name: Unit & integration tests
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages
      - run: npm test

  validate-examples:
    name: Validate examples
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages
      - run: npm run validate:examples

  build-docs:
    name: Build docs site
    needs: build-library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages
      - run: npm run build:docs
      - name: Upload docs gh-pages output
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages-docs
          path: gh-pages
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # Tier 3 — needs the built docs site.
  # -------------------------------------------------------------------------

  validate-pagesmith:
    name: Validate Pagesmith docs
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages
      - uses: actions/download-artifact@v4
        with:
          name: gh-pages-docs
          path: gh-pages
      - run: npm run validate:pagesmith

  validate-a11y:
    name: Static a11y scan (jsdom + axe-core)
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages
      - uses: actions/download-artifact@v4
        with:
          name: gh-pages-docs
          path: gh-pages
      - run: npm run validate:a11y

  # -------------------------------------------------------------------------
  # Publish — needs every quality gate to succeed AND the built library.
  # `id-token: write` is granted at the workflow level for npm provenance.
  # -------------------------------------------------------------------------

  publish:
    name: Publish to npm
    needs:
      - prepare
      - build-library
      - lint
      - unit
      - validate-examples
      - validate-pagesmith
      - validate-a11y
      - validate-diagrams
    runs-on: ubuntu-latest
    outputs:
      all_published: ${{ steps.final.outputs.all_published }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          name: library-dist
          path: packages

      - name: Publish @pagesmith/core
        if: needs.prepare.outputs.publish_core == 'true'
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pagesmith/site
        if: needs.prepare.outputs.publish_site == 'true'
        working-directory: packages/site
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pagesmith/docs
        if: needs.prepare.outputs.publish_docs == 'true'
        working-directory: packages/docs
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check final published versions
        id: final
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          package_exists() {
            if npm view "$1@${VERSION}" version >/dev/null 2>&1; then
              echo true
            else
              echo false
            fi
          }

          # Retry up to 5 times with 15s delay to handle npm registry propagation lag
          for attempt in 1 2 3 4 5; do
            CORE_EXISTS=$(package_exists "@pagesmith/core")
            SITE_EXISTS=$(package_exists "@pagesmith/site")
            DOCS_EXISTS=$(package_exists "@pagesmith/docs")

            if [ "$CORE_EXISTS" = "true" ] && [ "$SITE_EXISTS" = "true" ] && [ "$DOCS_EXISTS" = "true" ]; then
              echo "all_published=true" >> "$GITHUB_OUTPUT"
              echo "Version ${VERSION} is fully published (attempt ${attempt})."
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              echo "Not all packages visible yet (attempt ${attempt}/5). Retrying in 15s..."
              sleep 15
            fi
          done

          echo "all_published=false" >> "$GITHUB_OUTPUT"
          echo "Version ${VERSION} is not fully published after 5 attempts; skipping release commit/tag."

  # -------------------------------------------------------------------------
  # Tag and commit — only after the full coordinated version is published.
  # Uses fetch-depth: 0 so existing tags are visible.
  # -------------------------------------------------------------------------

  tag-and-commit:
    name: Tag & commit release
    needs: [prepare, publish]
    if: needs.publish.outputs.all_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-manifests
      - name: Commit and tag
        run: |
          TAG=${{ needs.prepare.outputs.tag }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json packages/core/package.json packages/site/package.json packages/docs/package.json

          if git diff --cached --quiet; then
            echo "No version file changes to commit for ${TAG}."
          else
            git commit -m "release: ${TAG}"
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally."
          else
            git tag -a "$TAG" -m "Release ${TAG}"
          fi

          git push origin HEAD:main --follow-tags
