name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version to release (for example 0.8.0)
        required: false
        type: string
      bump:
        description: Version bump type when version is not set
        required: true
        type: choice
        default: minor
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Resolve the release version from the current package line or an explicit override.
      - name: Resolve version
        id: version
        run: |
          OLD_VERSION=$(node -p "require('./packages/core/package.json').version")
          NEW_VERSION=$(node --strip-types --no-warnings ./scripts/resolve-release-version.ts \
            --current "$OLD_VERSION" \
            --bump "${{ inputs.bump }}" \
            --version "${{ inputs.version }}")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ -n "${{ inputs.version }}" ]; then
            echo "Releasing explicit version $NEW_VERSION (current line: $OLD_VERSION)"
          else
            echo "Bumping $OLD_VERSION → $NEW_VERSION (${{ inputs.bump }})"
          fi

      - name: Check published versions
        id: published
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PUBLISHED_COUNT=0

          check_exists() {
            local package_name=$1
            local output_name=$2
            if npm view "${package_name}@${VERSION}" version >/dev/null 2>&1; then
              echo "${output_name}=true" >> "$GITHUB_OUTPUT"
              PUBLISHED_COUNT=$((PUBLISHED_COUNT + 1))
            else
              echo "${output_name}=false" >> "$GITHUB_OUTPUT"
            fi
          }

          check_exists "@pagesmith/core" core_exists
          check_exists "@pagesmith/site" site_exists
          check_exists "@pagesmith/docs" docs_exists

          if [ "$PUBLISHED_COUNT" -eq 3 ]; then
            echo "Version ${VERSION} is already fully published." >&2
            exit 1
          fi

          if [ "$PUBLISHED_COUNT" -ne 0 ]; then
            echo "Partial publish detected for ${VERSION}. Aborting to avoid a mixed-source release." >&2
            echo "Finish that version from the exact same source commit or release a newer version instead." >&2
            exit 1
          fi

      # Keep public package versions and internal dependency ranges in lockstep
      - name: Sync package versions
        run: |
          VERSION=${{ steps.version.outputs.version }}
          npm run sync:versions -- "$VERSION"
          npm install --package-lock-only --ignore-scripts

      - name: Validate release candidate
        run: npm run validate

      - name: Validate diagrams
        run: npm run validate:diagrams

      # Publish the coordinated package set with provenance (Trusted Publisher / OIDC)
      - name: Publish @pagesmith/core
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pagesmith/site
        working-directory: packages/site
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pagesmith/docs
        working-directory: packages/docs
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Only commit and tag after all publishes succeed
      - name: Commit and tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json packages/core/package.json packages/site/package.json packages/docs/package.json
          git commit -m "release: ${TAG}"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin HEAD:main --follow-tags
